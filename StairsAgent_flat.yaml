# Baseline 1 — treino só em terreno plano (sem currículo, step_count=0).
# Serve para mostrar que o agente aprende rapidamente o caso fácil
# mas NÃO generaliza para escadas com curvas ou zig-zag.
#
# Usar: mlagents-learn StairsAgent_flat.yaml --run-id=stairs_flat_01

behaviors:
  StairsAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 1000000
    time_horizon: 64
    summary_freq: 10000

environment_parameters:
  step_count: 0
