behaviors:
  ParkourAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 64
      buffer_size: 2048
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 2000000
    time_horizon: 128
    summary_freq: 1000

environment_parameters:
  platform_gap:
    curriculum:
      - name: Facil
        completion_criteria:
          measure: reward
          behavior: ParkourAgent
          threshold: 0.7
          min_lesson_length: 100
          signal_smoothing: true
        value: 3.0
      - name: Medio
        completion_criteria:
          measure: reward
          behavior: ParkourAgent
          threshold: 0.7
          min_lesson_length: 100
          signal_smoothing: true
        value: 5.0
      - name: Dificil
        value: 7.0

  num_platforms:
    curriculum:
      - name: UmaPlataforma
        completion_criteria:
          measure: reward
          behavior: ParkourAgent
          threshold: 0.7
          min_lesson_length: 100
          signal_smoothing: true
        value: 1
      - name: DuasPlataformas
        completion_criteria:
          measure: reward
          behavior: ParkourAgent
          threshold: 0.7
          min_lesson_length: 100
          signal_smoothing: true
        value: 2
      - name: TresPlataformas
        completion_criteria:
          measure: reward
          behavior: ParkourAgent
          threshold: 0.7
          min_lesson_length: 100
          signal_smoothing: true
        value: 3
      - name: QuatroPlataformas
        value: 4