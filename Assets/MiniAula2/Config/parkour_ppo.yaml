behaviors:

  SpeedrunnerAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 256
      buffer_size: 8192
      learning_rate: 5.0e-4
      learning_rate_schedule: linear
      beta: 1.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.97
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10000000
    time_horizon: 256
    summary_freq: 5000

  CautiousAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 20480 
      learning_rate: 1.0e-4
      learning_rate_schedule: linear
      beta: 8.0e-3
      epsilon: 0.15
      lambd: 0.97
      num_epoch: 4 
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10000000
    time_horizon: 1024 
    summary_freq: 5000

  SaboteurAgent:
      trainer_type: ppo
      hyperparameters:
        batch_size: 256
        buffer_size: 8192
        learning_rate: 3.0e-4
        learning_rate_schedule: linear
        beta: 5.0e-3
        epsilon: 0.2
        lambd: 0.95
        num_epoch: 3
      network_settings:
        normalize: true
        hidden_units: 128
        num_layers: 2
      reward_signals:
        extrinsic:
          gamma: 0.99
          strength: 1.0
      keep_checkpoints: 5
      max_steps: 10000000
      time_horizon: 512
      summary_freq: 5000

environment_parameters:
  lesson:
    curriculum:
      - name: Lesson0
        completion_criteria:
          measure: reward
          behavior: SpeedrunnerAgent
          threshold: 0.6
          min_lesson_length: 200
          signal_smoothing: true
        value: 0
      - name: Lesson1
        completion_criteria:
          measure: reward
          behavior: SpeedrunnerAgent
          threshold: 0.6
          min_lesson_length: 200
          signal_smoothing: true
        value: 1
      - name: Lesson2
        completion_criteria:
          measure: reward
          behavior: SpeedrunnerAgent
          threshold: 0.6
          min_lesson_length: 200
          signal_smoothing: true
        value: 2
      - name: Lesson3
        value: 3