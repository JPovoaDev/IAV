# [LEGACY — guardado intencionalmente para o exercício meta da Parte B do guião.]
#
# Este é o currículo ANTIGO da aula 08, baseado em `platform_height`. Foi
# substituído por `StairsAgent_curriculum.yaml` (que usa `step_count`).
#
# Por que ficou guardado: este YAML é um caso de estudo. Treinado com este
# currículo e com `controller.stepOffset = 1.0f`, o agente NÃO aprende
# capacidade nova entre lições — em todas, `stepOffset >= platform_height`,
# logo a física do CharacterController resolve a vertical sozinha. A curva
# do TensorBoard sobe em escada bonita, mas é teatro: o que o agente aprende
# na lição 0 chega para todas as outras.
#
# Lê o exercício final do guião para a discussão.

behaviors:
  StairsAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 10000

environment_parameters:
  platform_height:
    curriculum:
      - name: Lesson0_flat
        completion_criteria:
          measure: reward
          behavior: StairsAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.8
        value: 0.0
      - name: Lesson1_low
        completion_criteria:
          measure: reward
          behavior: StairsAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.8
        value: 0.3
      - name: Lesson2_mid
        completion_criteria:
          measure: reward
          behavior: StairsAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.8
        value: 0.7
      - name: Lesson3_high
        value: 1.0
