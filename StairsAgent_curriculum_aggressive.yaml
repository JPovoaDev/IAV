behaviors:
  StairsAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 10000

environment_parameters:
  step_count:
    curriculum:
      - name: Flat
        completion_criteria:
          measure: reward
          behavior: StairsAgent
          threshold: 0.8
          min_lesson_length: 100
          signal_smoothing: true
        value: 0
      - name: Zigzag
        value: 8